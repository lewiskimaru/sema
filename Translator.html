<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
    <title>Sema Translator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            background-color: white; /* Default background color for light mode */
        }

        li {
            display: inline;
        }

        li a {
            display: block;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            color: black; /* Default color for light mode */
        }

        li a:hover {
            background-color: #111;
            color: white; /* Text color for light mode when hovered */
        }

        .logo img {
            height: 50px; /* Adjust the height of the logo */
            width: auto; /* Adjust the width of the logo */
            margin-top: 5px; /* Adjust the top margin of the logo */
        }

        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }

        /* Styles for dark mode */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #333;
            }

            ul {
                background-color: #333; /* Background color for dark mode */
            }

            li a {
                color: white; /* Text color for dark mode */
            }

            li a:hover {
                background-color: #111;
            }
        }
    </style>

</head>

<body>

    <ul>
        <li class="logo" id="logo"><img src="images/lightlogo.jpeg" alt="Logo"></li>
        <li><a href="Home.html">home</a></li>
        <li><a href="About.html">about</a></li>
        <li><a href="Contact.html">contact</a></li>
        <li><a href="blog/blog.html">Blog</a></li>
    </ul>

    <iframe
        src="https://kamau1-semaapi-frontend.hf.space"
        frameborder="0"
        width="100%"
        height="100%"
    ></iframe>

    <script>
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.getElementById('logo').innerHTML = '<img src="images/semalogo.png" alt="Logo">';
        }
    </script>

</body>

</html>
